name: 🦞 OpenClaw 1-Hour Shift (Cloudflare Edition)

on:
  workflow_dispatch: 

jobs:
  summon-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60 
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🦞 Install OpenClaw
        run: npm install -g openclaw@latest

      - name: 🚀 Start OpenClaw Gateway (Background)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          openclaw gateway run --port 8000 --allow-unconfigured &
          sleep 5

      - name: 🌐 Install & Start Cloudflare Quick Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          # 🔥 改變策略：我們強制將 metrics (包含網址) 寫入 metrics.txt
          cloudflared tunnel --url http://localhost:8000 --metrics localhost:60123 > tunnel.log 2>&1 &
          
          # 給它多一點時間連線
          sleep 15 
          
          # 從 metrics 服務中精準抓取 userHostname
          export CF_URL=$(curl -s http://localhost:60123/quicktunnel | jq -r '.userHostname')
          
          # 加上 https:// 前綴
          export FULL_URL="https://$CF_URL"
          
          echo "========================================="
          echo "🚀 成功啦！請複製下方網址："
          echo "👉 $FULL_URL 👈"
          echo "========================================="

      - name: ⏱️ Keep Alive for 1 Hour
        run: |
          echo "Agent 與 Cloudflare 穿透正在背景運行，倒數 59 分鐘後自動關閉..."
          sleep 3540
