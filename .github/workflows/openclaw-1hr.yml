name: 🦞 OpenClaw 1-Hour Shift (Cloudflare Edition)

on:
  workflow_dispatch: 

jobs:
  summon-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60 
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🦞 Install OpenClaw
        run: npm install -g openclaw@latest

      - name: 🚀 Start OpenClaw Gateway (Background)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          openclaw gateway run --port 8000 --allow-unconfigured &
          sleep 5

      - name: 🌐 Install & Start Cloudflare Quick Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          sleep 10 
          
          export CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
          
          echo "### 🦞 你的太空龍蝦已經上線！" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **專屬連結:** $CF_URL" >> $GITHUB_STEP_SUMMARY
          
          # 🔥 終極絕招：直接印在黑底白字的 Log 裡面！🔥
          echo "========================================="
          echo "🚀 成功啦！請複製下方網址："
          echo "👉 $CF_URL 👈"
          echo "========================================="

      - name: ⏱️ Keep Alive for 1 Hour
        run: |
          echo "Agent 與 Cloudflare 穿透正在背景運行，倒數 59 分鐘後自動關閉..."
          sleep 3540
