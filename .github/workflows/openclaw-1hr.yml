name: 🦞 OpenClaw Cloud Agent (OpenRouter)


on:
workflow_dispatch:


jobs:
openclaw-agent:
runs-on: ubuntu-latest
timeout-minutes: 60


steps:
  - name: 📥 Checkout Repository
    uses: actions/checkout@v4

  - name: ⚙️ Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: 🦞 Install OpenClaw
    run: |
      npm install -g openclaw@latest
      openclaw --version

  - name: ⚙️ Configure OpenClaw
    run: |
      mkdir -p ~/.openclaw/agents/main/agent

      # Gateway config
      cat <<EOF > ~/.openclaw/openclaw.json
      {
        "gateway": {
          "auth": {
            "token": "${{ secrets.OPENCLAW_TOKEN }}"
          },
          "controlUi": {
            "allowedOrigins": ["*"],
            "dangerouslyDisableDeviceAuth": true
          }
        }
      }
      EOF

      # Auth profiles (OpenRouter)
      cat <<EOF > ~/.openclaw/agents/main/agent/auth-profiles.json
      {
        "openrouter": {
          "apiKey": "${{ secrets.OPENROUTER_API_KEY }}"
        }
      }
      EOF

      # Force provider + model
      cat <<EOF > ~/.openclaw/agents/main/agent/agent.json
      {
        "provider": "openrouter",
        "model": "minimax/minimax-m2.5"
      }
      EOF

  - name: 🚀 Start OpenClaw Gateway
    run: |
      echo "Starting OpenClaw Gateway..."
      openclaw gateway run --port 8000 --allow-unconfigured > gateway.log 2>&1 &
      echo $! > gateway.pid

      echo "Waiting for gateway..."
      for i in {1..20}; do
        if nc -z localhost 8000; then
          echo "Gateway ready!"
          break
        fi
        sleep 2
      done

  - name: 🌐 Install Cloudflare Tunnel
    run: |
      wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
      sudo dpkg -i cloudflared-linux-amd64.deb

  - name: 🚇 Start Cloudflare Tunnel
    run: |
      cloudflared tunnel --url http://localhost:8000 --no-autoupdate > tunnel.log 2>&1 &

      echo "Waiting for public URL..."
      for i in {1..40}; do
        CF_URL=$(grep -o 'https://[a-zA-Z0-9.-]*trycloudflare.com' tunnel.log | head -n 1)
        if [ ! -z "$CF_URL" ]; then break; fi
        sleep 2
      done

      if [ -z "$CF_URL" ]; then
        echo "Tunnel failed:"
        cat tunnel.log
        exit 1
      fi

      echo "TUNNEL_URL=$CF_URL" >> $GITHUB_ENV

  - name: 📢 Show Access Info
    run: |
      echo "🦞 OpenClaw Agent Ready"
      echo "URL: $TUNNEL_URL"
      echo "Token: ${{ secrets.OPENCLAW_TOKEN }}"
      echo "Provider: OpenRouter"
      echo "Model: minimax/minimax-m2.5"

  - name: ⏱ Keep Alive
    run: |
      echo "Keeping agent alive for 59 minutes..."
      for i in {1..59}; do
        echo "Minute $i / 59"
        sleep 60
      done


