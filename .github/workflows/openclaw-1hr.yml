name: 🦞 OpenClaw 1-Hour Shift (OpenRouter MiniMax Edition)

on:
  workflow_dispatch: 

jobs:
  summon-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60 
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🦞 Install OpenClaw
        run: npm install -g openclaw@latest

      - name: 🚀 Configure & Start OpenClaw Gateway (Background)
        env:
          # 🔥 改用 OpenRouter 的金鑰
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p ~/.openclaw
          
          # 🔥 建立設定檔：指定 Provider 為 openrouter，模型為 minimax/minimax-m2.5
          cat <<EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "auth": {
                "token": "${{ secrets.OPENCLAW_TOKEN }}"
              },
              "controlUi": {
                "allowedOrigins": ["*"],
                "dangerouslyDisableDeviceAuth": true
              },
              "openai": {
                "apiKey": "${{ secrets.OPENROUTER_API_KEY }}",
                "baseURL": "https://openrouter.ai/api/v1",
                "defaultModel": "minimax/minimax-m2.5"
              }
            }
          }
          EOF
          
          # 啟動 Gateway
          openclaw gateway run --port 8000 --allow-unconfigured &
          sleep 5

      - name: 🌐 Install & Start Cloudflare Quick Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          
          echo "等待 Cloudflare 生成網址..."
          
          for i in {1..30}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            if [ ! -z "$CF_URL" ]; then
              echo "找到網址了！"
              break
            fi
            sleep 2
          done
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 錯誤：抓不到網址，請檢查 Cloudflare。"
            cat tunnel.log
            exit 1
          fi
          
          echo "========================================="
          echo "🚀 OpenRouter + MiniMax 2.5 已上線！"
          echo "👉 ${CF_URL}/#token=${{ secrets.OPENCLAW_TOKEN }} 👈"
          echo "========================================="

      - name: ⏱️ Keep Alive
        run: |
          echo "Agent 運行中，準備好測試 MiniMax 2.5 的實力了嗎？"
          sleep 3540
                "allowedOrigins": ["*"],
                "dangerouslyDisableDeviceAuth": true
              }
            }
          }
          EOF
          
          openclaw gateway run --port 8000 --allow-unconfigured &
          sleep 5

      - name: 🌐 Install & Start Cloudflare Quick Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          
          echo "等待 Cloudflare 生成網址..."
          
          for i in {1..30}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            
            if [ ! -z "$CF_URL" ]; then
              echo "找到網址了！"
              break
            fi
            sleep 2
          done
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 錯誤：等了 60 秒還是抓不到網址，請檢查 Cloudflare 服務是否正常。"
            cat tunnel.log
            exit 1
          fi
          
          echo "========================================="
          echo "🚀 成功啦！請複製下方網址 (密碼請輸入你設定的 Token)："
          echo "👉 $CF_URL 👈"
          echo "========================================="

      - name: ⏱️ Keep Alive
        run: |
          echo "Agent 與 Cloudflare 穿透正在背景運行，倒數 59 分鐘後自動關閉..."
          sleep 3540
                "allowedOrigins": ["*"]
              }
            }
          }
          EOF
          
          openclaw gateway run --port 8000 --allow-unconfigured &
          sleep 5

      - name: 🌐 Install & Start Cloudflare Quick Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          
          echo "等待 Cloudflare 生成網址..."
          
          for i in {1..30}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            
            if [ ! -z "$CF_URL" ]; then
              echo "找到網址了！"
              break
            fi
            sleep 2
          done
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 錯誤：等了 60 秒還是抓不到網址，請檢查 Cloudflare 服務是否正常。"
            cat tunnel.log
            exit 1
          fi
          
          echo "========================================="
          echo "🚀 成功啦！請複製下方網址 (密碼請輸入你設定的 Token)："
          echo "👉 $CF_URL 👈"
          echo "========================================="

      - name: ⏱️ Keep Alive & Auto-Approve Loop
        run: |
          echo "Agent 與 Cloudflare 穿透正在背景運行，倒數 59 分鐘後自動關閉..."
          echo "🟢 自動配對機器人已啟動！正在背景監聽配對請求..."
          
          # 執行 1200 次，每次等 3 秒 = 剛好卡住 1 小時
          for i in {1..1200}; do
            # 自動核准最新的配對請求，如果目前沒有請求則靜默略過
            openclaw devices approve --latest >/dev/null 2>&1 || true
            sleep 3
          done
              "controlUi": {
                "allowedOrigins": ["*"]
              }
            }
          }
          EOF
          
          # 啟動 Gateway (保留 --allow-unconfigured 以防它抱怨缺少其他預設值)
          openclaw gateway run --port 8000 --allow-unconfigured &
          sleep 5

      - name: 🌐 Install & Start Cloudflare Quick Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          
          echo "等待 Cloudflare 生成網址..."
          
          for i in {1..30}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            
            if [ ! -z "$CF_URL" ]; then
              echo "找到網址了！"
              break
            fi
            
            echo "還沒生成，繼續等... (嘗試次數: $i/30)"
            sleep 2
          done
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 錯誤：等了 60 秒還是抓不到網址，請檢查 Cloudflare 服務是否正常。"
            cat tunnel.log
            exit 1
          fi
          
          echo "========================================="
          echo "🚀 成功啦！請複製下方「已經合體完成」的終極網址："
          echo "👉 ${CF_URL}/#token=${{ secrets.OPENCLAW_TOKEN }} 👈"
          echo "========================================="

      - name: ⏱️ Keep Alive for 1 Hour
        run: |
          echo "Agent 與 Cloudflare 穿透正在背景運行，倒數 59 分鐘後自動關閉..."
          sleep 3540
