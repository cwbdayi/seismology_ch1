name: 🦞 OpenClaw Cloud Agent (OpenRouter)

on:
  workflow_dispatch:

jobs:
  openclaw-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 🦞 Install OpenClaw
        run: |
          npm install -g openclaw@latest
          export PATH="$(npm config get prefix)/bin:$PATH"
          openclaw --version

      - name: ⚙️ Configure OpenClaw Gateway
        run: |
          mkdir -p ~/.openclaw
          cat <<EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "auth": {
                "token": "${{ secrets.OPENCLAW_TOKEN }}"
              },
              "controlUi": {
                "allowedOrigins": ["*"],
                "dangerouslyDisableDeviceAuth": true
              }
            }
          }
          EOF

      - name: 🚀 Start Gateway
        env:
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          export OPENAI_API_KEY=$OPENAI_API_KEY

          openclaw gateway run \
            --host 0.0.0.0 \
            --port 8000 \
            --allow-unconfigured \
            > gateway.log 2>&1 &

          echo $! > gateway.pid

          echo "Waiting gateway..."

          for i in {1..20}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "Gateway ready!"
              break
            fi
            sleep 2
          done

      - name: 🌐 Install Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 🚇 Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:8000 --protocol http2 --no-autoupdate > tunnel.log 2>&1 &

          echo "Waiting tunnel..."

          for i in {1..40}; do
            CF_URL=$(grep -o 'https://[a-zA-Z0-9.-]*trycloudflare.com' tunnel.log | head -n 1)
            if [ ! -z "$CF_URL" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$CF_URL" ]; then
            cat tunnel.log
            exit 1
          fi

          echo "TUNNEL_URL=$CF_URL" >> $GITHUB_ENV

      - name: 📢 Show Access Info
        run: |
          echo "============================"
          echo "🦞 OpenClaw Gateway Ready"
          echo "URL: $TUNNEL_URL"
          echo "Token: ${{ secrets.OPENCLAW_TOKEN }}"
          echo ""
          echo "Example API:"
          echo "$TUNNEL_URL/v1/chat/completions"
          echo "============================"

      - name: ⏱ Keep Alive
        run: |
          for i in {1..59}; do
            echo "Minute $i / 59"
            sleep 60
          done

          echo "Session finished"
