name: 🦞 OpenClaw Cloud Agent (OpenRouter Pro)

on:
  workflow_dispatch:

jobs:
  openclaw-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd jq

      - name: 🦞 Install OpenClaw
        run: |
          npm install -g openclaw@latest
          openclaw --version

      - name: ⚙️ Configure OpenClaw
        run: |
          mkdir -p ~/.openclaw

          cat <<EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "auth": {
                "token": "${{ secrets.OPENCLAW_TOKEN }}"
              },
              "controlUi": {
                "allowedOrigins": ["*"]
              }
            }
          }
          EOF

      - name: 🤖 Setup OpenRouter Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          openclaw agents add openrouter \
            --profile openrouter \
            --provider openrouter \
            --api-key $OPENROUTER_API_KEY \
            --model minimax/minimax-m2.5

      - name: 🚀 Start OpenClaw Gateway
        run: |
          openclaw gateway run --port 8000 --allow-unconfigured > gateway.log 2>&1 &
          echo $! > gateway.pid

          echo "Waiting for gateway..."

          for i in {1..20}; do
            if nc -z localhost 8000; then
              echo "Gateway started"
              break
            fi
            sleep 2
          done

      - name: 🌐 Install Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 🚇 Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:8000 --no-autoupdate > tunnel.log 2>&1 &

          echo "Waiting for tunnel..."

          for i in {1..40}; do
            CF_URL=$(grep -o 'https://.*trycloudflare.com' tunnel.log | head -n 1)

            if [ ! -z "$CF_URL" ]; then
              break
            fi

            sleep 2
          done

          if [ -z "$CF_URL" ]; then
            echo "Tunnel failed"
            cat tunnel.log
            exit 1
          fi

          echo "TUNNEL_URL=$CF_URL" >> $GITHUB_ENV

      - name: 📢 Show Access Info
        run: |
          echo "================================="
          echo "🦞 OpenClaw Cloud Agent Ready"
          echo "================================="
          echo ""
          echo "🌐 Gateway URL:"
          echo "$TUNNEL_URL"
          echo ""
          echo "🔑 Token:"
          echo "${{ secrets.OPENCLAW_TOKEN }}"
          echo ""
          echo "🤖 Model:"
          echo "minimax/minimax-m2.5 (via OpenRouter)"
          echo ""
          echo "🖥 Control UI:"
          echo "$TUNNEL_URL/ui"
          echo ""
          echo "📡 API Endpoint:"
          echo "$TUNNEL_URL/v1/chat/completions"
          echo ""
          echo "================================="

      - name: ⏱ Keep Alive (59 min)
        run: |
          for i in {1..59}; do
            echo "Running minute $i / 59"
            sleep 60
          done

          echo "Session finished"
