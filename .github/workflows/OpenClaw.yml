name: 🦞 OpenClaw Cloud Agent (OpenRouter Pro)

on:
  workflow_dispatch:

jobs:
  openclaw-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd jq curl

      - name: 🦞 Install OpenClaw
        run: |
          npm install -g openclaw@latest
          echo "OpenClaw version:"
          openclaw --version

      - name: ⚙️ Configure OpenClaw
        run: |
          mkdir -p ~/.openclaw

          cat <<EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "auth": {
                "token": "${{ secrets.OPENCLAW_TOKEN }}"
              },
              "devicePairing": {
                "enabled": false
              },
              "controlUi": {
                "allowedOrigins": ["*"]
              }
            }
          }
          EOF

          echo "Config:"
          cat ~/.openclaw/openclaw.json

      - name: 🤖 Setup OpenRouter Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |

          echo "Registering OpenRouter agent..."

          openclaw agents add openrouter \
            --profile openrouter \
            --key $OPENROUTER_API_KEY \
            --model minimax/minimax-m2.5 || true

          echo "Current agents:"
          openclaw agents list || true

      - name: 🚀 Start Gateway
        run: |

          openclaw gateway run \
            --port 8000 \
            --allow-unconfigured \
            > gateway.log 2>&1 &

          echo $! > gateway.pid

          echo "Waiting for gateway..."

          for i in {1..30}; do
            if nc -z localhost 8000; then
              echo "Gateway started"
              break
            fi
            sleep 2
          done

          if ! nc -z localhost 8000; then
            echo "Gateway failed"
            cat gateway.log
            exit 1
          fi

      - name: 🌐 Install Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 🚇 Start Tunnel
        run: |

          cloudflared tunnel \
            --url http://localhost:8000 \
            --no-autoupdate \
            > tunnel.log 2>&1 &

          echo "Waiting for tunnel..."

          for i in {1..60}; do

            CF_URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare.com' tunnel.log | head -n 1)

            if [ ! -z "$CF_URL" ]; then
              echo "Tunnel ready:"
              echo $CF_URL
              break
            fi

            sleep 2
          done

          if [ -z "$CF_URL" ]; then
            echo "Tunnel failed"
            cat tunnel.log
            exit 1
          fi

          echo "TUNNEL_URL=$CF_URL" >> $GITHUB_ENV

      - name: 📢 Show Access Info
        run: |

          echo "================================="
          echo "🦞 OpenClaw Cloud Agent Ready"
          echo "================================="
          echo ""
          echo "🌐 Gateway:"
          echo "$TUNNEL_URL"
          echo ""
          echo "🖥 Control UI:"
          echo "$TUNNEL_URL/ui"
          echo ""
          echo "📡 API:"
          echo "$TUNNEL_URL/v1/chat/completions"
          echo ""
          echo "🔑 Token:"
          echo "${{ secrets.OPENCLAW_TOKEN }}"
          echo ""
          echo "🤖 Model:"
          echo "minimax/minimax-m2.5"
          echo ""
          echo "================================="

      - name: 🔍 Debug Logs
        run: |
          echo "------ Gateway Log ------"
          cat gateway.log || true

      - name: ⏱ Keep Alive
        run: |
          for i in {1..59}; do
            echo "Running minute $i / 59"
            sleep 60
          done

          echo "Session finished"
