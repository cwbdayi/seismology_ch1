name: 🦞 OpenClaw 1-Hour Shift (OpenRouter Edition)

on:
  workflow_dispatch: 

jobs:
  summon-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60 
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🦞 Install OpenClaw
        run: npm install -g openclaw@latest

      - name: 🚀 Configure & Start OpenClaw Gateway (Background)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 建立 Gateway 與 Agent 的設定檔目錄
          mkdir -p ~/.openclaw/agents/main/agent
          
          # 1. Gateway 設定 (登入密碼與白名單)
          cat <<EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "auth": {
                "token": "${{ secrets.OPENCLAW_TOKEN }}"
              },
              "controlUi": {
                "allowedOrigins": ["*"],
                "dangerouslyDisableDeviceAuth": true
              }
            }
          }
          EOF
          
          # 2. 🔥 Agent 認證設定：直接把 OpenRouter 金鑰寫入它要求的檔案！
          cat <<EOF > ~/.openclaw/agents/main/agent/auth-profiles.json
          {
            "openrouter": {
              "apiKey": "${{ secrets.OPENROUTER_API_KEY }}"
            },
            "anthropic": {
              "apiKey": "dummy-key-to-bypass-startup-check"
            }
          }
          EOF
          
          # 3. 啟動 Gateway (強制指定預設模型為 minimax)
          OPENCLAW_MODEL="openrouter/minimax/minimax-m2.5" openclaw gateway run --port 8000 --allow-unconfigured &
          sleep 5

      - name: 🌐 Install & Start Cloudflare Quick Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          
          echo "等待 Cloudflare 生成網址..."
          
          for i in {1..30}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            
            if [ ! -z "$CF_URL" ]; then
              echo "找到網址了！"
              break
            fi
            sleep 2
          done
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 錯誤：等了 60 秒還是抓不到網址，請檢查 Cloudflare 服務是否正常。"
            cat tunnel.log
            exit 1
          fi
          
          echo "========================================="
          echo "🚀 成功啦！請複製下方網址 (密碼請輸入你設定的 Token)："
          echo "👉 $CF_URL 👈"
          echo "========================================="

      - name: ⏱️ Keep Alive
        run: |
          echo "Agent 與 Cloudflare 穿透正在背景運行，倒數 59 分鐘後自動關閉..."
          sleep 3540
