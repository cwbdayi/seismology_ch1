                    style={{ 
                      transform: `translateY(${Math.sin((i / 20) * Math.PI * 4) * 15}px)`,
                      animation: 'wave 1.5s infinite linear',
                      animationDelay: `${i * 0.1}s`
                    }}
                  />
                ))}
              </div>
              <style>{`
                @keyframes wave {
                  0%, 100% { transform: translateY(0px); }
                  50% { transform: translateY(-15px); }
                }
              `}</style>
            </div>
          </div>
        );
      }

      if (type === "faults") {
        return (
          <div className="w-full flex justify-around py-6 text-center text-sm font-bold text-gray-700">
            <div>
              <p className="mb-2 text-white">正斷層 (拉張)</p>
              <svg width="80" height="80" viewBox="0 0 100 100">
                <polygon points="10,40 50,40 50,90 10,90" fill="#cbd5e1" stroke="#475569" />
                <polygon points="52,50 90,50 90,100 52,100" fill="#94a3b8" stroke="#475569" className="animate-bounce" style={{animationDuration: '3s'}}/>
                <path d="M 5,65 L -5,65 M 95,75 L 105,75" stroke="red" strokeWidth="3" markerEnd="url(#arrow)" />
              </svg>
            </div>
            <div>
              <p className="mb-2 text-white">逆斷層 (擠壓)</p>
              <svg width="80" height="80" viewBox="0 0 100 100">
                <polygon points="10,50 50,50 50,100 10,100" fill="#cbd5e1" stroke="#475569" />
                <polygon points="48,40 90,40 90,90 48,90" fill="#94a3b8" stroke="#475569" className="animate-bounce" style={{animationDuration: '3s', animationDirection: 'reverse'}}/>
                <path d="M -5,75 L 5,75 M 105,65 L 95,65" stroke="red" strokeWidth="3" markerEnd="url(#arrow)" />
              </svg>
            </div>
          </div>
        );
      }

      if (type === "elasticRebound") {
        return (
          <div className="w-full flex justify-center py-6 overflow-hidden">
            <svg width="300" height="150" viewBox="0 0 300 150">
              <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                  <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
                </marker>
              </defs>
              <g className="animate-slide-left">
                <rect x="10" y="20" width="130" height="100" fill="#d1d5db" stroke="#374151" strokeWidth="2" />
                <path d="M 75,70 L 75,30" stroke="#ef4444" strokeWidth="4" markerEnd="url(#arrow)" />
              </g>
              <g className="animate-slide-right">
                <rect x="150" y="20" width="130" height="100" fill="#9ca3af" stroke="#374151" strokeWidth="2" />
                <path d="M 215,70 L 215,110" stroke="#ef4444" strokeWidth="4" markerEnd="url(#arrow)" />
              </g>
              <line x1="145" y1="10" x2="145" y2="130" stroke="#ef4444" strokeWidth="3" strokeDasharray="5,5" />
              <text x="145" y="145" fontSize="12" textAnchor="middle" fill="#ef4444">斷層線</text>
            </svg>
            <style>{`
              .animate-slide-left {
                animation: slideLeft 4s infinite;
              }
              .animate-slide-right {
                animation: slideRight 4s infinite;
              }
              @keyframes slideLeft {
                0% { transform: translateY(0) skewY(0); }
                40% { transform: translateY(0) skewY(-5deg); fill: #fca5a5; }
                45% { transform: translateY(-15px) skewY(0); }
                100% { transform: translateY(-15px); }
              }
              @keyframes slideRight {
                0% { transform: translateY(0) skewY(0); }
                40% { transform: translateY(0) skewY(-5deg); fill: #fca5a5; }
                45% { transform: translateY(15px) skewY(0); }
                100% { transform: translateY(15px); }
              }
            `}</style>
          </div>
        );
      }

      return null;
    };

    // --- 主應用程式 ---
    function App() {
      const [activeTopicId, setActiveTopicId] = useState(1);
      const [showFeedback, setShowFeedback] = useState(false);

      const activeTopic = topicsData.find(t => t.id === activeTopicId);

      useEffect(() => {
        setShowFeedback(false);
      }, [activeTopicId]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col md:flex-row">
          
          <aside className="w-full md:w-1/4 bg-slate-900 text-white shadow-xl z-10 flex flex-col md:h-screen sticky top-0 md:overflow-y-auto">
            <div className="p-6 bg-slate-950">
              <h1 className="text-2xl font-bold flex items-center gap-2 text-blue-400">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-8 h-8">
                  <path d="M2 12h4l2-9 4 18 2-9h4" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                地震學第一章
              </h1>
              <p className="text-sm text-slate-400 mt-2">大師級深度導航系統</p>
            </div>
            <nav className="flex-1 px-4 py-4 space-y-1">
              {topicsData.map((topic) => (
                <button
                  key={topic.id}
                  onClick={() => setActiveTopicId(topic.id)}
                  className={`w-full text-left px-4 py-3 rounded-lg transition-all duration-200 flex items-center gap-3 ${
                    activeTopicId === topic.id 
                      ? "bg-blue-600 text-white shadow-md font-medium" 
                      : "text-slate-300 hover:bg-slate-800 hover:text-white"
                  }`}
                >
                  <div className="w-6 flex justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                      <path d={topic.icon} />
                    </svg>
                  </div>
                  <span className="text-sm truncate">{topic.title}</span>
                </button>
              ))}
            </nav>
          </aside>

          <main className="flex-1 p-6 md:p-10 md:h-screen md:overflow-y-auto bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50">
            <div className="max-w-4xl mx-auto space-y-8 animate-fade-in">
              
              <header className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200">
                <h2 className="text-3xl font-extrabold text-slate-800 mb-4">{activeTopic.title}</h2>
                <div className="w-16 h-1.5 bg-blue-500 rounded-full mb-6"></div>
                <p className="text-slate-600 text-lg leading-relaxed">
                  各位同學好，我是你們的地震學大師！讓我們一起用最輕鬆的方式，來探索這個主題吧。
                </p>
              </header>

              <div className="grid gap-6">
                {activeTopic.qna.map((item, index) => (
                  <div key={index} className="bg-white rounded-xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-shadow relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-blue-400"></div>
                    <h3 className="text-xl font-bold text-slate-800 mb-3 flex items-start gap-2">
                      <span className="text-blue-500 shrink-0">Q:</span> 
                      {item.q}
                    </h3>
                    <div className="text-slate-600 leading-relaxed pl-6 whitespace-pre-line">
                      <span className="font-bold text-slate-400 absolute left-6">A: </span>
                      <span className="pl-6 block">{item.a}</span>
                    </div>
                  </div>
                ))}
              </div>

              {activeTopic.animationType !== "none" && (
                <div className="bg-slate-800 rounded-xl p-6 shadow-lg text-white">
                  <h4 className="text-center font-bold text-slate-300 mb-2">🔭 科學視覺化圖解</h4>
                  <AnimationDisplay type={activeTopic.animationType} />
                </div>
              )}

              <div className="bg-amber-50 rounded-xl p-6 border border-amber-200 shadow-sm text-amber-900 text-lg">
                {activeTopic.metaphor}
              </div>

              <div className="mt-12 bg-blue-50 rounded-xl p-8 border-2 border-dashed border-blue-200 text-center">
                <h3 className="text-xl font-bold text-blue-900 mb-4">教授的課堂隨堂考 🤔</h3>
                <p className="text-blue-800 mb-6">
                  關於這部分的解釋，你聽得懂嗎？或者你有什麼大膽的假設性問題想問嗎？（例如：如果地球是空心的會怎樣？）
                </p>
                
                {!showFeedback ? (
                  <div className="flex justify-center gap-4">
                    <button 
                      onClick={() => setShowFeedback(true)}
                      className="px-6 py-2 bg-blue-600 text-white font-medium rounded-full hover:bg-blue-700 transition-colors shadow-sm"
                    >
                      完全懂了！教授講得真好
                    </button>
                    <button 
                      onClick={() => setShowFeedback(true)}
                      className="px-6 py-2 bg-white text-blue-600 font-medium rounded-full hover:bg-blue-50 transition-colors border border-blue-200 shadow-sm"
                    >
                      我還有點疑惑...
                    </button>
                  </div>
                ) : (
                  <div className="animate-fade-in text-emerald-700 font-bold bg-emerald-100 py-3 px-6 rounded-lg inline-block">
                    太棒了！科學的進步就是源於不斷的提問與思考。保持這份好奇心，我們繼續進入下一章吧！🎓
                  </div>
                )}
              </div>
              
              <div className="flex justify-between items-center pt-8 border-t border-slate-200">
                <button 
                  onClick={() => setActiveTopicId(Math.max(1, activeTopicId - 1))}
                  disabled={activeTopicId === 1}
                  className="px-4 py-2 text-slate-500 hover:text-slate-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2"
                >
                  ← 上一章
                </button>
                <span className="text-slate-400 text-sm">
                  章節 {activeTopicId} / {topicsData.length}
                </span>
                <button 
                  onClick={() => setActiveTopicId(Math.min(topicsData.length, activeTopicId + 1))}
                  disabled={activeTopicId === topicsData.length}
                  className="px-4 py-2 text-blue-600 font-medium hover:text-blue-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2"
                >
                  下一章 →
                </button>
              </div>

            </div>
          </main>
          
          <style>{`
            .animate-fade-in { animation: fadeIn 0.5s ease-out; }
            .animate-spin-slow { animation: spin 20s linear infinite; }
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(10px); }
              to { opacity: 1; transform: translateY(0); }
            }
            @keyframes spin {
              from { transform: rotate(0deg); }
              to { transform: rotate(360deg); }
            }
          `}</style>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
